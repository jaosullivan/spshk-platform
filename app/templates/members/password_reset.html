{% extends 'base.html' %}
{% block title %}Reset Password — SPSHK{% endblock %}

{% block content %}
<div class="max-w-md mx-auto">

  <div class="text-center mb-8">
    <span class="text-4xl">&#9752;</span>
    <h1 class="text-3xl font-bold text-irish-800 mt-3 mb-2">Reset Your Password</h1>
    <p class="text-gray-500 text-sm">Enter your registered email address and we'll send you a reset link.</p>
  </div>

  <div class="bg-white border border-gray-100 rounded-2xl shadow-sm p-8">
    <form method="post" novalidate>
      {% csrf_token %}

      <div class="mb-6">
        <label for="id_email" class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1.5">Email Address</label>
        <input id="id_email" name="email" type="email" required autocomplete="email"
               class="w-full border border-gray-200 focus:border-irish-600 focus:ring-1 focus:ring-irish-600 rounded-lg px-4 py-3 text-sm outline-none transition-colors"
               placeholder="sean@example.com">
      </div>

      <button type="submit"
              class="w-full bg-irish-600 hover:bg-irish-700 text-white font-semibold py-3.5 rounded-lg transition-colors text-sm">
        Send Reset Link
      </button>
    </form>

    <div class="mt-6 pt-6 border-t border-gray-100 text-center">
      <a href="{% url 'members:login' %}" class="text-sm text-irish-600 hover:underline">Back to Sign In</a>
    </div>
  </div>

</div>
{% endblock %}
